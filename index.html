<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Copy Tabs</title>

<style>
  body {
    margin: 0;
    background: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
  }

  .tabs {
    display: flex;
    background: #2b2b2b;
    border-bottom: 1px solid #444;
  }

  .tab-button {
    padding: 14px 20px;
    border: none;
    background: #2b2b2b;
    color: white;
    cursor: pointer;
    font-size: 15px;
    transition: 0.2s;
  }

  .tab-button:hover {
    background: #3a3a3a;
  }

  .tab-button.active {
    background: #0078d7;
  }

  .tab-content {
    display: none;
    padding: 20px;
  }

  .tab-content.active {
    display: block;
  }

  .code-box {
    background: #111;
    color: #00ff88;
    border: 1px solid #555;
    padding: 15px;

    white-space: pre-wrap;
    word-wrap: break-word;

    overflow-x: auto;
    overflow-y: auto;

    max-height: 500px;

    font-family: monospace;
    font-size: 14px;
    line-height: 1.5;

    box-sizing: border-box;
  }

  .copy-btn {
    margin-top: 12px;
    padding: 10px 16px;
    border: none;
    border-radius: 5px;
    background: #0078d7;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }

  .copy-btn:hover {
    background: #005fa3;
  }

  .status {
    margin-left: 10px;
    color: #00ff88;
  }
</style>
</head>
<body>

<!-- TAB BUTTONS -->
<div class="tabs">
  <button class="tab-button active" onclick="openTab('main', this)">
    Main Code
  </button>

  <button class="tab-button" onclick="openTab('settings', this)">
    Settings Top Down
  </button>

  <button class="tab-button" onclick="openTab('notes', this)">
    Settings 2D Platformer
  </button>
</div>

<!-- MAIN TAB -->
<div id="main" class="tab-content active">
  <h2>Main Code</h2>

  <pre id="mainCode" class="code-box"></pre>

  <button class="copy-btn"
          onclick="copyCode('mainCode', 'mainStatus')">
    Copy Code
  </button>

  <span id="mainStatus" class="status"></span>
</div>

<!-- SETTINGS TAB -->
<div id="settings" class="tab-content">
  <h2>Settings Top Down</h2>

  <pre id="settingsCode" class="code-box"></pre>

  <button class="copy-btn"
          onclick="copyCode('settingsCode', 'settingsStatus')">
    Copy Code
  </button>

  <span id="settingsStatus" class="status"></span>
</div>

<!-- NOTES TAB -->
<div id="notes" class="tab-content">
  <h2>Settings 2D Platformer</h2>

  <pre id="notesCode" class="code-box"></pre>

  <button class="copy-btn"
          onclick="copyCode('notesCode', 'notesStatus')">
    Copy Text
  </button>

  <span id="notesStatus" class="status"></span>
</div>

<script>
  // =========================
  // STORE CODE AS PLAIN TEXT
  // =========================

  const codeBlocks = {

    mainCode: `
<html>
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        canvas {
            border: 5px solid white;
        }
    </style>
</head>

<body>

<canvas id="gameCanvas" width="960" height="720"></canvas>

<script src="settings.js"><\/script>

<script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE_SIZE = 80;

const keys = {};

const tile_dictionary = {
    0:{color: "rgb(0,0,0)", solid: false},
    1:{color: "rgb(255,0,0)", solid: true},
    2:{color: "rgb(0,0,255)", solid: true}
};

const map = [ // 0-1-2-3-4
                [0,0,0,0,1], //0
                [2,1,2,0,1], //1
                [0,0,0,0,1], //2
                [2,0,2,1,1], //3
                [2,0,0,0,0], //4
                [1,1,1,1,1]  //5
];

const currentMap = new TileMap(map);
const player = new Player(0, 0, 5)
const goal = new Goal(4, 4);
let won = false;

function gameLoop() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const movement = player.handleInput(keys)
    player.move(movement.dx, movement.dy, currentMap)

    if (goal.checkGoal(player)) won = true;

    currentMap.draw();
    player.draw();
    goal.draw();

    if (won) goal.drawWinText();

    requestAnimationFrame(gameLoop);
}

gameLoop();

<\/script>

</body>
</html>
`,

    settingsCode: `
window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

class TileMap {
    constructor (map){
        this.map = map;
        this.width = map[0].length;
        this.height = map.length;
    }

    draw(){
        for(let y = 0; y < this.height; y++){
            for(let x = 0; x < this.width; x++){
                const tileType = this.map[y][x];
                const tile = tile_dictionary[tileType];

                ctx.fillStyle = tile.color;
                ctx.fillRect(
                    x * TILE_SIZE,
                    y * TILE_SIZE,
                    TILE_SIZE,TILE_SIZE
                )
            }
        }
    }
}

class Player {
    constructor(x, y, spd = 5) {
        this.x = x * TILE_SIZE + 20;
        this.y = y * TILE_SIZE + 20;
        this.width = 40;
        this.height = 40;
        this.speed = spd;
    }

    handleInput(keys) {
        let dx = 0;
        let dy = 0;

        if (keys["a"]) dx = -this.speed;
        if (keys["d"]) dx = this.speed;
        if (keys["w"]) dy = -this.speed;
        if (keys["s"]) dy = this.speed;

        return { dx, dy };
    }

    move(dx, dy, tilemap) {
        // Move horizontally
        this.x += dx;
        this.collide(dx, 0, tilemap);

        // Move vertically
        this.y += dy;
        this.collide(0, dy, tilemap);
    }

    collide(dx, dy, tilemap) {
        const tileX = Math.floor((this.x + this.width / 2) / TILE_SIZE);
        const tileY = Math.floor((this.y + this.height / 2) / TILE_SIZE);

        for (let y = tileY - 1; y <= tileY + 1; y++) {
            for (let x = tileX - 1; x <= tileX + 1; x++) {

                // Bounds check
                if (
                    x >= 0 &&
                    x < tilemap.width &&
                    y >= 0 &&
                    y < tilemap.height
                ) {

                    const tileType = tilemap.map[y][x];
                    const tile = tile_dictionary[tileType];

                    if (tile.solid) {

                        const tileRect = {
                            x: x * TILE_SIZE,
                            y: y * TILE_SIZE,
                            width: TILE_SIZE,
                            height: TILE_SIZE
                        };

                        if (this.intersects(tileRect)) {

                            if (dx > 0) { // Moving right
                                this.x = tileRect.x - this.width;
                            }

                            if (dx < 0) { // Moving left
                                this.x = tileRect.x + tileRect.width;
                            }

                            if (dy > 0) { // Moving down
                                this.y = tileRect.y - this.height;
                            }

                            if (dy < 0) { // Moving up
                                this.y = tileRect.y + tileRect.height;
                            }
                        }
                    }
                }
            }
        }
    }

    intersects(rect) {
        return (
            this.x < rect.x + rect.width &&
            this.x + this.width > rect.x &&
            this.y < rect.y + rect.height &&
            this.y + this.height > rect.y
        );
    }

    draw() {
        ctx.fillStyle = "rgb(100, 200, 255)";
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

class Goal {

    constructor(x, y) {
        this.x = x * TILE_SIZE + 20;
        this.y = y * TILE_SIZE + 20;
        this.width = 40;
        this.height = 40;
    }

    checkGoal(player) {
        if (this.intersects(player)) return true;
  
        return false;
    }

    intersects(player) {

        return (
            this.x < player.x + player.width &&
            this.x + this.width > player.x &&
            this.y < player.y + player.height &&
            this.y + this.height > player.y
        );
    }

    draw() {
        ctx.fillStyle = "rgb(255, 255, 255)";
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }

    drawWinText() {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";

        ctx.fillText("You Win!", canvas.width / 2, canvas.height / 2);
    }
}
`,

    notesCode: `
window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

class TileMap {
    constructor (map){
        this.map = map;
        this.width = map[0].length;
        this.height = map.length;
    }

    draw(){
        for(let y = 0; y < this.height; y++){
            for(let x = 0; x < this.width; x++){
                const tileType = this.map[y][x];
                const tile = tile_dictionary[tileType];

                ctx.fillStyle = tile.color;
                ctx.fillRect(
                    x * TILE_SIZE,
                    y * TILE_SIZE,
                    TILE_SIZE,TILE_SIZE
                )
            }
        }
    }
}

class Player {
    constructor(x, y, spd = 5) {
        this.x = x * TILE_SIZE + 20;
        this.y = y * TILE_SIZE + 20;
        this.width = 40;
        this.height = 40;
        this.speed = spd;

        this.velocity = 0;
        this.jumpForce = -15;
        this.gravity = 0.5;
        this.isGrounded = false;
    }

    handleInput(keys) {
        let dx = 0;
        let dy = 0;

        if (keys["a"]) dx = -this.speed;
        if (keys["d"]) dx = this.speed;

        if (keys[" "] && this.isGrounded){
            this.isGrounded = false;
            this.velocity = this.jumpForce;
        }

        return { dx, dy };
    }

    move(dx, dy, tilemap) {
        // Move horizontally
        this.x += dx;
        this.collide(dx, 0, tilemap);

        //Applying gravity
        this.velocity += this.gravity;
        
        if (this.velocity > 20) this.velocity = 20;

        // Move vertically
        this.y += this.velocity;
        this.isGrounded = false;
        this.collide(0, this.velocity, tilemap);
    }

    collide(dx, dy, tilemap) {
        const tileX = Math.floor((this.x + this.width / 2) / TILE_SIZE);
        const tileY = Math.floor((this.y + this.height / 2) / TILE_SIZE);

        for (let y = tileY - 1; y <= tileY + 1; y++) {
            for (let x = tileX - 1; x <= tileX + 1; x++) {

                // Bounds check
                if (
                    x >= 0 &&
                    x < tilemap.width &&
                    y >= 0 &&
                    y < tilemap.height
                ) {

                    const tileType = tilemap.map[y][x];
                    const tile = tile_dictionary[tileType];

                    if (tile.solid) {

                        const tileRect = {
                            x: x * TILE_SIZE,
                            y: y * TILE_SIZE,
                            width: TILE_SIZE,
                            height: TILE_SIZE
                        };

                        if (this.intersects(tileRect)) {

                            if (dx > 0) { // Moving right
                                this.x = tileRect.x - this.width;
                            }

                            if (dx < 0) { // Moving left
                                this.x = tileRect.x + tileRect.width;
                            }

                            if (dy > 0) { // Moving down
                                this.y = tileRect.y - this.height;
                                this.velocity = 0;
                                this.isGrounded = true;
                            }

                            if (dy < 0) { // Moving up
                                this.y = tileRect.y + tileRect.height;
                                this.velocity = 0;
                            }
                        }
                    }
                }
            }
        }
    }

    intersects(rect) {
        return (
            this.x < rect.x + rect.width &&
            this.x + this.width > rect.x &&
            this.y < rect.y + rect.height &&
            this.y + this.height > rect.y
        );
    }

    draw() {
        ctx.fillStyle = "rgb(100, 200, 255)";
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

class Goal {

    constructor(x, y) {
        this.x = x * TILE_SIZE + 20;
        this.y = y * TILE_SIZE + 20;
        this.width = 40;
        this.height = 40;
    }

    checkGoal(player) {
        if (this.intersects(player)) return true;
  
        return false;
    }

    intersects(player) {

        return (
            this.x < player.x + player.width &&
            this.x + this.width > player.x &&
            this.y < player.y + player.height &&
            this.y + this.height > player.y
        );
    }

    draw() {
        ctx.fillStyle = "rgb(255, 255, 255)";
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }

    drawWinText() {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";

        ctx.fillText("You Win!", canvas.width / 2, canvas.height / 2);
    }
}
`
  };

  // =========================
  // LOAD CODE INTO BOXES
  // =========================

  for (const id in codeBlocks) {
    document.getElementById(id).textContent =
      codeBlocks[id].trim();
  }

  // =========================
  // TAB SYSTEM
  // =========================

  function openTab(tabId, button) {

    document.querySelectorAll(".tab-content")
      .forEach(tab => {
        tab.classList.remove("active");
      });

    document.querySelectorAll(".tab-button")
      .forEach(btn => {
        btn.classList.remove("active");
      });

    document.getElementById(tabId)
      .classList.add("active");

    button.classList.add("active");
  }

  // =========================
  // COPY FUNCTION
  // =========================

  function copyCode(codeId, statusId) {

    const text =
      document.getElementById(codeId).textContent;

    const status =
      document.getElementById(statusId);

    navigator.clipboard.writeText(text)

      .then(() => {

        status.textContent = "Copied!";

        setTimeout(() => {
          status.textContent = "";
        }, 1500);

      })

      .catch(err => {

        status.textContent = "Copy failed";

        console.error(err);
      });
  }
</script>

</body>
</html>
